services:
  traefik:
    container_name: traefik
    image: traefik:latest
    env_file:
      - .env
    networks:
      - global
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${TRAEFIK_FILES}/traefik.toml:/etc/traefik/traefik.toml
      - ${TRAEFIK_FILES}/acme.json:/acme.json
      - ${TRAEFIK_FILES}/.htpasswd:/.htpasswd
    labels:
      - "traefik.http.middlewares.dmc-auth.basicauth.usersfile=/.htpasswd"
      ## Shared secure-headers middleware (non-host-specific, always available)
      - 'traefik.http.middlewares.secure-headers.headers.customResponseHeaders.X-Robots-Tag=noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex'
      - 'traefik.http.middlewares.secure-headers.headers.SSLRedirect=true'
      - 'traefik.http.middlewares.secure-headers.headers.STSSeconds=315360000'
      - 'traefik.http.middlewares.secure-headers.headers.STSIncludeSubdomains=true'
      - 'traefik.http.middlewares.secure-headers.headers.STSPreload=true'
      - 'traefik.http.middlewares.secure-headers.headers.forceSTSHeader=true'
      - 'traefik.http.middlewares.secure-headers.headers.frameDeny=true'
      - 'traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true'
      - 'traefik.http.middlewares.secure-headers.headers.customresponseheaders.X-XSS-PROTECTION=1'

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - 9443:9443
      - 8000:8000  # Remove if you do not intend to use Edge Agents


networks:
  global:
    external: true
  default:
    name: portainer_network

volumes:
  portainer_data:
    name: portainer_data
